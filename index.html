<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RPG Task Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="level-up-overlay" class="level-up-modal">LEVEL UP!</div>

    <div id="intro-overlay" class="full-modal hidden">
        <div class="modal-box">
            <h2>Vyber si svého strážce</h2>
            <div class="avatar-select-grid">
                <div class="av-option" onclick="chooseAvatar('Drak', '🐉')"><span>🐉</span><p>Drak</p></div>
                <div class="av-option" onclick="chooseAvatar('Gryf', '🦅')"><span>🦅</span><p>Gryf</p></div>
                <div class="av-option" onclick="chooseAvatar('Fénix', '🔥')"><span>🔥</span><p>Fénix</p></div>
            </div>
        </div>
    </div>

    <div id="view-tasks" class="app-page active">
        <header class="status-card">
            <div class="mini-avatar" id="mini-avatar-icon">❓</div>
            <div class="lvl-circle">
                <small>LEVEL</small>
                <span id="player-lvl">1</span>
            </div>
            <div class="stats-bar">
                <div class="stat-item">💰 <span id="gold-tasks">0</span></div>
                <div class="stat-item">✨ <span id="av-name-tasks">...</span> (Evo <span id="av-lvl-tasks">1</span>)</div>
            </div>
            <div class="progress-container">
                <div class="progress-bg"><div id="xp-fill" class="fill"></div></div>
                <small id="xp-text">0 / 200 XP</small>
            </div>
        </header>

        <section class="input-section">
            <input type="text" id="task-input" placeholder="Zadej nový úkol...">
            <div class="input-row">
                <select id="task-diff">
                    <option value="10">Lehký (10 XP)</option>
                    <option value="30">Střední (30 XP)</option>
                    <option value="50">Těžký (50 XP)</option>
                </select>
                <button id="add-task-btn">PŘIDAT</button>
            </div>
        </section>

        <nav class="filter-nav">
            <button onclick="setFilter('all')" class="f-btn active" id="f-all">Vše</button>
            <button onclick="setFilter('10')" class="f-btn" id="f-10">10 XP</button>
            <button onclick="setFilter('30')" class="f-btn" id="f-30">30 XP</button>
            <button onclick="setFilter('50')" class="f-btn" id="f-50">50 XP</button>
        </nav>

        <div class="list-container">
            <div class="list-header" onclick="toggleCollapse('pending-list')">
                AKTIVNÍ ÚKOLY <span id="arrow-pending-list">▼</span>
            </div>
            <ul id="pending-list" class="task-list show"></ul>

            <div class="list-header" onclick="toggleCollapse('done-list')">
                DOKONČENO <span id="arrow-done-list">▶</span>
            </div>
            <ul id="done-list" class="task-list"></ul>
        </div>
    </div>

    <div id="view-hatchery" class="app-page">
        <header class="status-card">
            <div class="gold-badge">💰 <span id="gold-hatchery">0</span> G</div>
            <div class="avatar-hero-area" id="evo-container">
                <div id="big-avatar" class="floating-anim">❓</div>
                <div id="evo-flash" class="flash-effect"></div>
            </div>
            <h2 id="av-full-name">Tvůj strážce</h2>
            <div class="food-status">
                <p>Nasycení: <span id="food-val">0</span> / 5</p>
                <div class="progress-bg"><div id="food-fill" class="fill food"></div></div>
            </div>
        </header>

        <div class="shop-card">
            <div class="shop-text">
                <strong>Magické maso</strong>
                <p>Cena: 100 Goldů</p>
            </div>
            <button onclick="feedAvatar()" class="buy-btn">KRMIT 🥩</button>
        </div>
        <button id="evolve-btn" onclick="triggerEvolve()" class="btn-evolve hidden">✨ EVOLVOVAT ✨</button>
    </div>

    <nav class="bottom-menu">
        <button onclick="changeTab('tasks')" id="tab-tasks" class="menu-item active">⚔️ Úkoly</button>
        <button onclick="changeTab('hatchery')" id="tab-hatchery" class="menu-item">🐾 Líheň</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
